<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gebedstijden Checker</title>
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #131926;
            --surface2: #1a2236;
            --border: rgba(255,255,255,0.06);
            --text: #e4e8f1;
            --dim: #5a6b8a;
            --accent: #4a9eff;
            --gold: #f5c842;
            --green: #34d399;
            --orange: #fb923c;
            --red: #f87171;
            --r: 14px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
            background:var(--bg);color:var(--text);
            min-height:100vh;min-height:100dvh;
            -webkit-font-smoothing:antialiased;
        }

        /* ═══════════════════════════════════════
           DESKTOP LAYOUT (>768px)
           Sidebar links + main rechts
           ═══════════════════════════════════════ */
        @media(min-width:769px){
            .shell{
                display:grid;
                grid-template-columns:360px 1fr;
                height:100vh;
                overflow:hidden;
            }
            .sidebar{
                background:var(--surface);
                border-right:1px solid var(--border);
                padding:28px 20px;
                overflow-y:auto;
                display:flex;
                flex-direction:column;
            }
            .main{
                padding:28px 32px;
                overflow-y:auto;
            }
            .mobile-header{display:none}
        }

        /* ═══════════════════════════════════════
           MOBILE LAYOUT (<768px)
           Single column, stacked
           ═══════════════════════════════════════ */
        @media(max-width:768px){
            .shell{
                display:flex;
                flex-direction:column;
                min-height:100vh;
                min-height:100dvh;
            }
            .sidebar{
                padding:0 14px 14px;
            }
            .main{
                padding:0 14px 14px;
                padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));
            }
            .desktop-logo{display:none}
        }

        /* ── Shared components ── */
        .logo{margin-bottom:20px}
        .logo h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
        .logo .sub{color:var(--dim);font-size:12px;margin-top:2px}
        .mobile-header{
            padding:16px 14px 8px;
            text-align:center;
        }
        .mobile-header h1{font-size:18px;font-weight:700}
        .mobile-header .sub{color:var(--dim);font-size:11px;margin-top:1px}

        .card{
            background:var(--surface);
            border-radius:var(--r);
            border:1px solid var(--border);
            padding:16px;
            margin-bottom:12px;
        }
        .card-label{
            font-size:10px;font-weight:700;color:var(--dim);
            text-transform:uppercase;letter-spacing:1px;
            margin-bottom:10px;
        }

        /* ── Moskee info ── */
        .moskee-top{display:flex;justify-content:space-between;align-items:flex-start}
        .moskee-top h2{font-size:17px;font-weight:700;color:var(--accent)}
        .moskee-top .meta{color:var(--dim);font-size:11px;margin-top:2px}
        .btn-sm{
            background:none;border:1px solid rgba(74,158,255,0.2);color:var(--accent);
            padding:5px 10px;border-radius:7px;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0;margin-left:10px;
        }

        /* ── Zoek ── */
        .search-row{display:flex;gap:8px}
        .search-row input{
            flex:1;padding:11px 14px;border-radius:10px;
            border:1px solid var(--border);background:var(--bg);
            color:#fff;font-size:16px;outline:none;
        }
        .search-row input:focus{border-color:var(--accent)}
        .search-row button{
            padding:11px 18px;border-radius:10px;border:none;
            background:var(--accent);color:#fff;font-weight:600;font-size:14px;cursor:pointer;
        }
        .res-item{
            padding:11px;border-radius:9px;background:var(--bg);
            margin-top:6px;cursor:pointer;border:1px solid transparent;
        }
        .res-item:hover,.res-item:active{border-color:var(--accent)}
        .res-item .ri-n{font-weight:600;font-size:13px}
        .res-item .ri-a{color:var(--dim);font-size:11px;margin-top:1px}

        /* ── Status pill ── */
        .pill{
            border-radius:10px;padding:10px 14px;margin-bottom:12px;
            font-size:13px;font-weight:600;text-align:center;
        }
        .pill.ok{background:rgba(52,211,153,0.08);color:var(--green);border:1px solid rgba(52,211,153,0.15)}
        .pill.warn{background:rgba(251,146,60,0.08);color:var(--orange);border:1px solid rgba(251,146,60,0.15);text-align:left}
        .pill .w-i{font-weight:400;font-size:11px;margin-top:3px}

        /* ── Gebedstijden rijen ── */
        .g-row{
            display:flex;align-items:center;
            padding:11px 0;border-bottom:1px solid var(--border);
        }
        .g-row:last-child{border-bottom:none}
        .g-row .gl{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
        .g-row .g-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
        .g-dot.ok{background:var(--green)}.g-dot.warning{background:var(--orange)}.g-dot.error{background:var(--red)}
        .g-row .g-name{font-weight:600;font-size:13px;white-space:nowrap}
        .g-row .gr{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto}
        .g-col{text-align:center;min-width:46px}
        .g-col .gc-l{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
        .g-col .gc-v{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
        .g-badge{
            font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;
            min-width:42px;text-align:center;font-variant-numeric:tabular-nums;
        }
        .g-badge.ok{background:rgba(52,211,153,0.1);color:var(--green)}
        .g-badge.warning{background:rgba(251,146,60,0.1);color:var(--orange)}
        .g-badge.error{background:rgba(248,113,113,0.1);color:var(--red)}

        /* ── Zon stats ── */
        .zs-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
        .zs-item{text-align:center;padding:10px 4px;background:var(--bg);border-radius:10px}
        .zs-item .zi{font-size:16px}.zs-item .zl{font-size:9px;color:var(--dim);margin-top:1px}
        .zs-item .zv{font-size:15px;font-weight:700;margin-top:1px}

        /* ── Overzicht gebed + zonnestand ── */
        .oz-row{
            display:flex;align-items:center;gap:10px;
            padding:12px 0;border-bottom:1px solid var(--border);
        }
        .oz-row:last-child{border-bottom:none}
        .oz-row .oz-icon{font-size:20px;flex-shrink:0;width:28px;text-align:center}
        .oz-row .oz-info{flex:1;min-width:0}
        .oz-row .oz-naam{font-size:14px;font-weight:700}
        .oz-row .oz-zon{font-size:11px;color:var(--dim);margin-top:1px}
        .oz-row .oz-right{flex-shrink:0;text-align:right}
        .oz-row .oz-tijd{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
        .oz-row .oz-hoek{
            font-size:10px;font-weight:600;margin-top:2px;
            padding:1px 6px;border-radius:4px;display:inline-block;
        }
        .oz-hoek.pos{background:rgba(245,200,66,0.1);color:var(--gold)}
        .oz-hoek.neg{background:rgba(74,158,255,0.1);color:var(--accent)}
        .oz-hoek.nul{background:rgba(255,152,0,0.1);color:var(--orange)}

        /* ── Zonnestanden timeline ── */
        .tl-section{margin-top:14px}
        .tl-row{
            display:flex;align-items:center;gap:10px;
            padding:8px 0;border-bottom:1px solid var(--border);
        }
        .tl-row:last-child{border-bottom:none}
        .tl-dot{
            width:10px;height:10px;border-radius:50%;flex-shrink:0;
            border:2px solid;
        }
        .tl-dot.nacht{background:#0a1030;border-color:#5c6bc0}
        .tl-dot.astro{background:#141e45;border-color:#5c6bc0}
        .tl-dot.naut{background:#1a2d55;border-color:#42a5f5}
        .tl-dot.civil{background:#203860;border-color:#4fc3f7}
        .tl-dot.zon{background:#4a3000;border-color:#ff9800}
        .tl-dot.mid{background:#4a3a00;border-color:#f5c842}
        .tl-info{flex:1;min-width:0}
        .tl-naam{font-size:12px;font-weight:600}
        .tl-desc{font-size:10px;color:var(--dim)}
        .tl-tijd{
            font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;
            flex-shrink:0;min-width:48px;text-align:right;
        }
        .tl-hoek{
            font-size:10px;font-weight:600;flex-shrink:0;
            padding:2px 6px;border-radius:4px;min-width:40px;text-align:center;
        }
        .tl-hoek.pos{background:rgba(245,200,66,0.1);color:var(--gold)}
        .tl-hoek.neg{background:rgba(74,158,255,0.1);color:var(--accent)}
        .tl-hoek.nul{background:rgba(255,152,0,0.1);color:var(--orange)}
        .tl-divider{
            font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;
            letter-spacing:1px;padding:10px 0 4px;
        }

        /* ── Canvas ── */
        .chart-wrap{margin-top:12px;border-radius:12px;overflow:hidden;background:#080c16}
        canvas#chart{width:100%;display:block}

        /* ── Loading ── */
        .ld{text-align:center;padding:40px 0;color:var(--dim)}
        .sp{
            width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--accent);
            border-radius:50%;animation:s .7s linear infinite;margin:0 auto 6px;
        }
        @keyframes s{to{transform:rotate(360deg)}}

        /* ── Desktop tweaks ── */
        @media(min-width:769px){
            .card{margin-bottom:16px;padding:20px}
            .g-row{padding:14px 0}
            .g-row .g-name{font-size:14px}
            .g-col{min-width:52px}
            .g-col .gc-v{font-size:17px}
            .g-badge{font-size:11px;padding:3px 9px;min-width:50px}
            .zs-grid{gap:10px}
            .zs-item{padding:14px 8px}
            .zs-item .zv{font-size:18px}
        }

        /* ── Small phones ── */
        @media(max-width:380px){
            .zs-grid{grid-template-columns:repeat(2,1fr)}
            .g-col .gc-v{font-size:13px}
            .g-row .g-name{font-size:12px}
        }
    </style>
</head>
<body>

<div class="shell">
    <!-- SIDEBAR (desktop) / top section (mobile) -->
    <div class="sidebar">
        <div class="logo desktop-logo">
            <h1>Gebedstijden Checker</h1>
            <div class="sub">Mawaqit vs. zonnestand</div>
        </div>

        <div class="mobile-header">
            <h1>Gebedstijden Checker</h1>
            <div class="sub">Mawaqit vs. zonnestand</div>
        </div>

        <!-- Zoek -->
        <div id="zoek" class="card" style="display:none">
            <div class="card-label">Moskee zoeken</div>
            <div class="search-row">
                <input type="text" id="si" placeholder="Stad of naam..." />
                <button onclick="zoek()">Zoek</button>
            </div>
            <div id="res"></div>
        </div>

        <!-- Moskee -->
        <div id="mc" class="card" style="display:none">
            <div class="moskee-top">
                <div>
                    <h2 id="mn"></h2>
                    <div class="meta" id="md"></div>
                </div>
                <button class="btn-sm" onclick="toonZoek()">Wijzig</button>
            </div>
        </div>

        <!-- Status -->
        <div id="st" style="display:none"></div>

        <!-- Tijden -->
        <div id="tc" class="card" style="display:none">
            <div class="card-label">Gebedstijden</div>
            <div id="tl"></div>
        </div>

        <!-- Overzicht gebed + zonnestand (desktop: sidebar) -->
        <div id="oz-sidebar" class="card" style="display:none">
            <div class="card-label">Gebed & Zonnestand</div>
            <div id="oz-sidebar-list"></div>
        </div>
    </div>

    <!-- MAIN (desktop: rechts / mobile: onder) -->
    <div class="main">
        <div id="ld" class="ld" style="display:none">
            <div class="sp"></div><div>Laden...</div>
        </div>

        <!-- Overzicht gebed + zonnestand (mobile: hier bovenaan) -->
        <div id="oz-main" class="card" style="display:none">
            <div class="card-label">Gebed & Zonnestand</div>
            <div id="oz-main-list"></div>
        </div>

        <!-- Zon stats -->
        <div id="zc" class="card" style="display:none">
            <div class="card-label">Zonnestand vandaag</div>
            <div id="zs" class="zs-grid"></div>
            <div class="chart-wrap"><canvas id="chart"></canvas></div>
        </div>

        <!-- Zonnestanden -->
        <div id="zst-card" class="card" style="display:none">
            <div class="card-label">Astronomische zonnestanden</div>
            <div id="zst-list"></div>
        </div>
    </div>
</div>

<script>
const CFG={{config|tojson}};
let _rh=null;
const isDesktop=()=>window.innerWidth>768;

document.addEventListener('DOMContentLoaded',()=>{
    CFG?laadTijden():toonZoek();
    document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')zoek()});
});

function toonZoek(){
    show('zoek');hide('mc','st','tc','zc','oz-sidebar','oz-main','zst-card');
    document.getElementById('si').focus();
}
function show(...ids){ids.forEach(id=>document.getElementById(id).style.display='')}
function hide(...ids){ids.forEach(id=>document.getElementById(id).style.display='none')}

async function zoek(){
    const q=document.getElementById('si').value.trim();if(!q)return;
    let r;
    const resp=await fetch(`/api/zoek?q=${encodeURIComponent(q)}`);
    r=await resp.json();
    const c=document.getElementById('res');
    if(!r.length){c.innerHTML='<div style="padding:10px;color:var(--dim)">Geen resultaten</div>';return}
    c.innerHTML=r.map(m=>`<div class="res-item" onclick='kies(${JSON.stringify(m)})'><div class="ri-n">${m.naam}</div><div class="ri-a">${m.adres}</div></div>`).join('');
}

async function kies(m){
    await fetch('/api/kies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(m)});
    hide('zoek');document.getElementById('res').innerHTML='';laadTijden();
}

async function laadTijden(){
    show('ld');hide('tc','zc','oz-sidebar','oz-main','st','zst-card');
    const data=await(await fetch('/api/tijden')).json();
    hide('ld');
    if(data.error){alert(data.error);toonZoek();return}

    show('mc');
    document.getElementById('mn').textContent=data.moskee;
    document.getElementById('md').textContent=`${data.datum}  ·  ${data.methode}`;

    // Status
    const w=data.vergelijking.filter(v=>v.status!=='ok');
    const se=document.getElementById('st');show('st');
    if(!w.length){se.className='pill ok';se.textContent='Alle tijden kloppen'}
    else{se.className='pill warn';se.innerHTML=`<div>${w.length} afwijking${w.length>1?'en':''}</div>`+w.map(x=>`<div class="w-i">${x.icoon} ${x.naam}: ${Math.abs(x.verschil)} min</div>`).join('')}

    // Tijden
    show('tc');
    document.getElementById('tl').innerHTML=data.vergelijking.map(v=>`
        <div class="g-row">
            <div class="gl"><span class="g-dot ${v.status}"></span><span class="g-name">${v.naam}</span></div>
            <div class="gr">
                <div class="g-col"><div class="gc-l">Moskee</div><div class="gc-v">${v.moskee}</div></div>
                <div class="g-col"><div class="gc-l">Berekend</div><div class="gc-v">${v.berekend}</div></div>
                <div class="g-badge ${v.status}">${v.verschil>0?'+':''}${v.verschil}</div>
            </div>
        </div>`).join('');

    // Zon
    const z=data.zonnestand;show('zc');
    document.getElementById('zs').innerHTML=[
        {i:'🌅',l:'Opkomst',v:z.zonsopkomst},{i:'☀️',l:'Hoogste',v:z.max_hoogte+'°'},
        {i:'🌇',l:'Ondergang',v:z.zonsondergang},{i:'🕐',l:'Daglicht',v:z.daglicht},
    ].map(s=>`<div class="zs-item"><div class="zi">${s.i}</div><div class="zl">${s.l}</div><div class="zv">${s.v}</div></div>`).join('');

    // Overzicht: gebed + zonnestand in 1 kaart
    const hoeken=z.gebedstijd_hoeken||[];
    const vMap={};data.vergelijking.forEach(v=>{vMap[v.naam]={moskee:v.moskee,berekend:v.berekend}});

    const ozHTML=hoeken.map(h=>{
        const cls=h.hoek===null?'nul':h.hoek>0?'pos':h.hoek<0?'neg':'nul';
        const val=h.hoek!==null?(h.hoek>0?'+':'')+h.hoek+'°':'—';
        const tijden=vMap[h.naam]||{};
        const tijd=tijden.berekend||h.tijd||'—';
        return `<div class="oz-row">
            <div class="oz-icon">${h.icoon}</div>
            <div class="oz-info">
                <div class="oz-naam">${h.naam}</div>
                <div class="oz-zon">${h.uitleg}</div>
            </div>
            <div class="oz-right">
                <div class="oz-tijd">${tijd}</div>
                <div class="oz-hoek ${cls}">${val}</div>
            </div>
        </div>`;
    }).join('');

    if(isDesktop()){
        show('oz-sidebar');hide('oz-main');
        document.getElementById('oz-sidebar-list').innerHTML=ozHTML;
    } else {
        show('oz-main');hide('oz-sidebar');
        document.getElementById('oz-main-list').innerHTML=ozHTML;
    }

    // Zonnestanden
    const zst=z.zonnestanden||[];
    show('zst-card');
    let prevFase='';
    document.getElementById('zst-list').innerHTML=zst.map(s=>{
        let dotCls='nacht';
        if(s.hoek===0)dotCls='zon';
        else if(s.hoek>0)dotCls='mid';
        else if(s.hoek>=-6)dotCls='civil';
        else if(s.hoek>=-12)dotCls='naut';
        else dotCls='astro';

        const hCls=s.hoek>0?'pos':s.hoek<0?'neg':'nul';
        const hTxt=s.hoek>0?'+'+s.hoek+'°':s.hoek+'°';

        let divider='';
        const fase=s.fase;
        if(fase!==prevFase){
            const faseLabel=fase==='ochtend'?'Ochtend':fase==='middag'?'Middag':'Avond';
            divider=`<div class="tl-divider">${faseLabel}</div>`;
            prevFase=fase;
        }

        return divider+`<div class="tl-row">
            <div class="tl-dot ${dotCls}"></div>
            <div class="tl-info"><div class="tl-naam">${s.naam.replace(/ \(ochtend\)| \(avond\)/,'')}</div><div class="tl-desc">${s.uitleg}</div></div>
            <div class="tl-hoek ${hCls}">${hTxt}</div>
            <div class="tl-tijd">${s.tijd}</div>
        </div>`;
    }).join('');

    // Grafiek
    if(_rh)window.removeEventListener('resize',_rh);
    const draw=()=>tekenGrafiek(z.zonnepad,hoeken,data.vergelijking);
    setTimeout(draw,80);
    _rh=()=>{
        if(isDesktop()){show('oz-sidebar');hide('oz-main');document.getElementById('oz-sidebar-list').innerHTML=ozHTML}
        else{show('oz-main');hide('oz-sidebar');document.getElementById('oz-main-list').innerHTML=ozHTML}
        draw();
    };
    window.addEventListener('resize',_rh);
}

/* ═══ GRAFIEK ═══ */
function tM(t){const[h,m]=t.split(':').map(Number);return h*60+m}

function tekenGrafiek(pad,gebeden,verg){
    const canvas=document.getElementById('chart');
    const dpr=window.devicePixelRatio||1;
    const W=canvas.parentElement.clientWidth;
    const mob=W<480;
    const H=mob?380:360;
    canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.height=H+'px';
    const c=canvas.getContext('2d');c.scale(dpr,dpr);

    const hArr=pad.map(p=>p.hoogte);
    const top=Math.max(...hArr)+8,bot=-22,rng=top-bot;
    const mL=mob?38:44,mR=mob?12:8,mT=mob?16:16,mB=mob?32:36;
    const gW=W-mL-mR,gH=H-mT-mB;

    const xP=i=>mL+(i/(pad.length-1))*gW;
    const yP=h=>mT+(1-(h-bot)/rng)*gH;

    // Zones
    [[bot,-18,'#060a14'],[-18,-12,'#0b1225'],[-12,-6,'#111c3a'],[-6,0,'#182952'],[0,top,'#14203c']].forEach(([a,b,col])=>{
        c.fillStyle=col;c.fillRect(mL,yP(b),gW,yP(a)-yP(b));
    });

    // Schemeringlijnen — alleen op Y-as labels, geen tekst op de lijn (voorkomt overlap)
    [[-18,'#5c6bc0'],[-12,'#42a5f5'],[-6,'#4fc3f7'],[0,'#ff9800']].forEach(([h,col])=>{
        const y=yP(h);
        c.save();c.strokeStyle=col;c.globalAlpha=h===0?.5:.25;c.lineWidth=h===0?1.5:.7;c.setLineDash(h===0?[5,4]:[3,5]);
        c.beginPath();c.moveTo(mL,y);c.lineTo(mL+gW,y);c.stroke();c.restore();
    });

    // Y-as met schemeringlabels
    c.font=`${mob?9:9}px system-ui`;c.textAlign='right';
    for(let h=Math.ceil(bot/10)*10;h<=top;h+=10){
        c.fillStyle='#2d3f5c';
        c.fillText(h+'°',mL-5,yP(h)+3);
    }

    // Glow
    c.beginPath();c.moveTo(xP(0),yP(0));
    for(let i=0;i<pad.length;i++)c.lineTo(xP(i),yP(Math.max(pad[i].hoogte,0)));
    c.lineTo(xP(pad.length-1),yP(0));c.closePath();
    const gl=c.createLinearGradient(0,yP(top),0,yP(0));
    gl.addColorStop(0,'rgba(245,200,66,0.15)');gl.addColorStop(1,'rgba(245,200,66,0.01)');
    c.fillStyle=gl;c.fill();

    // Curve
    c.beginPath();c.moveTo(xP(0),yP(pad[0].hoogte));
    for(let i=1;i<pad.length;i++){
        const p={x:xP(i-1),y:yP(pad[i-1].hoogte)},n={x:xP(i),y:yP(pad[i].hoogte)},mx=(p.x+n.x)/2;
        c.bezierCurveTo(mx,p.y,mx,n.y,n.x,n.y);
    }
    c.save();c.shadowColor='rgba(245,200,66,.3)';c.shadowBlur=10;c.strokeStyle='#f5c842';c.lineWidth=mob?2:2.5;c.stroke();c.restore();
    c.strokeStyle='#ffd54f';c.lineWidth=mob?1.8:2;c.stroke();

    // Markers
    const gk={
        Fajr:{bg:'#1a3560',fg:'#7eb8ff',r:'#4a9eff'},Shurooq:{bg:'#5c2d00',fg:'#ffd8a8',r:'#fb923c'},
        Dhuhr:{bg:'#4d3800',fg:'#fff3c4',r:'#f5c842'},Asr:{bg:'#164028',fg:'#a7f3d0',r:'#34d399'},
        Maghrib:{bg:'#5c2200',fg:'#ffd8a8',r:'#fb923c'},Isha:{bg:'#1e2558',fg:'#c7d2fe',r:'#818cf8'},
    };
    const vMap={};verg.forEach(v=>{vMap[v.naam]=v.berekend});

    const pts=[];
    for(const g of gebeden){
        const t=vMap[g.naam]||g.tijd;if(!t)continue;
        let bi=0,bd=Infinity;
        for(let i=0;i<pad.length;i++){const d=Math.abs(tM(pad[i].tijd)-tM(t));if(d<bd){bd=d;bi=i}}
        pts.push({...g,t,x:xP(bi),y:yP(pad[bi].hoogte)});
    }

    // Badge afmetingen
    const bH=mob?17:20;const lfs=mob?9:11;

    // Meet alle badge breedtes van tevoren
    for(const p of pts){
        c.font=`bold ${lfs}px system-ui`;
        p.tw=c.measureText(p.naam).width+12;
    }

    // Anti-overlap: labels BOVEN de dot, met betere collision detection
    for(let i=0;i<pts.length;i++){
        pts[i].ly=pts[i].y-22;
        // Check overlap met alle eerdere labels
        for(let j=0;j<i;j++){
            const xOverlap=Math.abs(pts[i].x-pts[j].x)<(Math.max(pts[i].tw,pts[j].tw)/2+8);
            const yOverlap=Math.abs(pts[i].ly-pts[j].ly)<bH+5;
            if(xOverlap&&yOverlap){
                pts[i].ly=pts[j].ly-bH-6;
            }
        }
        // Niet buiten de grafiek
        if(pts[i].ly<mT+2)pts[i].ly=mT+2;
    }

    // Teken gebedstijden op X-as (in plaats van uur-labels, zodat ze niet overlappen)
    const usedXRanges=[];

    for(const p of pts){
        const k=gk[p.naam]||{bg:'#333',fg:'#fff',r:'#888'};

        // Stippellijn naar beneden
        c.save();c.strokeStyle=k.r;c.globalAlpha=.15;c.setLineDash([3,3]);c.lineWidth=1;
        c.beginPath();c.moveTo(p.x,p.y);c.lineTo(p.x,mT+gH);c.stroke();c.restore();

        // Dot
        const dr=mob?5:6;
        c.beginPath();c.arc(p.x,p.y,dr,0,Math.PI*2);c.fillStyle=k.bg;c.fill();c.strokeStyle=k.r;c.lineWidth=2;c.stroke();
        c.beginPath();c.arc(p.x,p.y,2,0,Math.PI*2);c.fillStyle=k.fg;c.fill();

        // Verbindingslijn dot → label
        c.save();c.strokeStyle=k.r;c.globalAlpha=.2;c.lineWidth=.8;
        c.beginPath();c.moveTo(p.x,p.y-dr);c.lineTo(p.x,p.ly+bH/2);c.stroke();c.restore();

        // Badge — alleen naam, geen hoek (te druk op mobiel)
        c.font=`bold ${lfs}px system-ui`;
        const tw=p.tw;
        const bx=Math.max(mL,Math.min(p.x-tw/2,mL+gW-tw));
        const by=p.ly-bH/2;

        c.fillStyle=k.bg;c.globalAlpha=.92;
        c.beginPath();c.roundRect(bx,by,tw,bH,5);c.fill();
        c.globalAlpha=1;c.strokeStyle=k.r;c.lineWidth=1;c.stroke();

        c.fillStyle=k.fg;c.font=`bold ${lfs}px system-ui`;c.textAlign='center';
        c.fillText(p.naam,bx+tw/2,by+bH/2+3);

        // Tijd label onder X-as — check overlap
        c.font=`bold ${mob?8:9}px system-ui`;
        const tTxt=p.t;
        const tW=c.measureText(tTxt).width;
        const tX=p.x;
        const tY=mT+gH+(mob?12:14);
        let canPlace=true;
        for(const r of usedXRanges){
            if(Math.abs(tX-r)<(mob?32:36)){canPlace=false;break}
        }
        if(canPlace){
            c.fillStyle=k.r;c.globalAlpha=.7;c.textAlign='center';
            c.fillText(tTxt,tX,tY);
            c.globalAlpha=1;
            usedXRanges.push(tX);
        }
    }

    // X-as uurlabels — skip als te dicht bij gebedstijd-labels
    c.fillStyle='#2d3f5c';c.font=`${mob?7:8}px system-ui`;c.textAlign='center';
    const step=mob?6:3;
    for(let h=0;h<=24;h+=step){
        const idx=Math.round((h*60)/10);if(idx>=pad.length)continue;
        const x=xP(idx);
        let tooClose=false;
        for(const r of usedXRanges){if(Math.abs(x-r)<(mob?28:32)){tooClose=true;break}}
        if(!tooClose)c.fillText(`${h.toString().padStart(2,'0')}:00`,x,mT+gH+(mob?24:30));
    }
}
</script>
